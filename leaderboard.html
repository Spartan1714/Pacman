<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pacman Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background: black;
            color: white;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            padding: 50px;
        }
        h1 { color: yellow; text-shadow: 0 0 10px yellow; margin-bottom: 40px; }
        ol {
            display: inline-block;
            text-align: left;
            font-size: 18px;
            line-height: 2;
            color: #00ffff;
        }
        li { margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .score-val { color: #ff00ff; float: right; margin-left: 40px; }
        button {
            margin-top: 50px;
            font-family: 'Press Start 2P';
            padding: 15px 30px;
            background: #a8a800;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: yellow; color: black; }
    </style>
</head>

<body>

    <h1>TOP 10 PLAYERS</h1>
    
    <ol id="scoresList">
        </ol>

    <br>
    <button onclick="window.location='index.html'">BACK TO GAME</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Usamos tu configuración exacta
        const firebaseConfig = {
            apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
            authDomain: "pacman-game-e602a.firebaseapp.com",
            projectId: "pacman-game-e602a",
            storageBucket: "pacman-game-e602a.firebasestorage.app",
            messagingSenderId: "316960307396",
            appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadScores() {
            const listElement = document.getElementById("scoresList");
            listElement.innerHTML = "LOADING...";

            try {
                // Consultamos la colección "scores" ordenada por puntaje de mayor a menor, límite 10
                const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);

                listElement.innerHTML = ""; // Limpiamos el mensaje de carga

                if (querySnapshot.empty) {
                    listElement.innerHTML = "NO SCORES YET";
                    return;
                }

                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    const li = document.createElement("li");
                    
                    // Creamos el formato: NOMBRE ...... PUNTAJE
                    li.innerHTML = `${data.username || "GUEST"} <span class="score-val">${data.score}</span>`;
                    listElement.appendChild(li);
                });
            } catch (error) {
                console.error("Error cargando puntajes:", error);
                listElement.innerHTML = "ERROR LOADING DATA";
            }
        }

        loadScores();
    </script>
</body>
</html>
