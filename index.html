<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman Arcade - Recuperado</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS CSS PARA RECREAR EL DISEÑO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Todo negro alrededor, como en las imágenes */
            background-color: #000; 
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evitamos barras de desplazamiento */
        }

        /* Contenedor principal Grid para el diseño lateral */
        .game-wrapper {
            display: grid;
            /* La primera columna (área de juego) es flexible.
               La segunda columna (botones) tiene un ancho fijo. */
            grid-template-columns: 1fr 200px; 
            gap: 20px;
            width: 90vw; /* Ajusta el ancho total del layout */
            max-width: 1400px;
            align-items: start; /* Alinea los elementos al inicio verticalmente */
            padding: 20px;
        }

        /* Área de juego negra con borde amarillo */
        .game-area {
            grid-column: 1; /* Primera columna */
            background-color: #000;
            border: 5px solid #ff0; /* Borde amarillo grueso, como en la imagen */
            box-shadow: 0 0 15px #ff0; /* Efecto de brillo sutil */
            aspect-ratio: 4 / 3; /* Mantiene una proporción de juego clásica */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; /* Para el texto del juego */
        }

        /* Lienzo del juego (canvas) */
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Contenedor de botones a la derecha */
        .button-sidebar {
            grid-column: 2; /* Segunda columna */
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaciado entre botones */
            padding-top: 10px; /* Alineación vertical con el borde superior del juego */
        }

        /* Estilo de los botones, como en la imagen */
        .arcade-btn {
            background-color: #000;
            color: #ff0; /* Texto amarillo */
            border: 3px solid #ff0; /* Borde amarillo, igual que el área de juego */
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            padding: 15px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s; /* Pequeña animación */
        }

        /* Efecto al pasar el ratón */
        .arcade-btn:hover {
            background-color: #ff0;
            color: #000;
        }

        /* --- ESTILOS PARA LOS TEXTOS DEL JUEGO (COMO EN IMAGE_2.PNG) --- */
        .overlay-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 1.5;
            color: #fff;
        }

        .game-over-title {
            font-size: 30px;
            color: #f00; /* GAME OVER en rojo */
            margin-bottom: 20px;
        }

        .game-stat {
            font-size: 14px;
            margin-bottom: 10px;
        }
        
    </style>
</head>
<body>

<div class="game-wrapper">
    
    <div class="game-area">
        <canvas id="gameCanvas"></canvas>
        
        <div class="overlay-text">
            <h1 class="game-over-title">GAME OVER</h1>
            <p class="game-stat">PLAYER: javierriveraaguilera504</p>
            <p class="game-stat">SCORE: 460</p>
        </div>
    </div>

    <div class="button-sidebar">
        <button id="pauseBtn" class="arcade-btn">PAUSE</button>
        <button id="menuBtn" class="arcade-btn">MENU</button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
      authDomain: "pacman-game-e602a.firebaseapp.com",
      projectId: "pacman-game-e602a",
      storageBucket: "pacman-game-e602a.firebasestorage.app",
      messagingSenderId: "316960307396",
      appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location = "login.html";
        }
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
