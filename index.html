<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-container">
    <button id="pauseBtn" class="hud-button">PAUSE</button>
    <button id="menuBtn" class="hud-button">MENU</button>

    <canvas id="gameCanvas"></canvas>

    <div id="menuScreen" class="overlay hidden">
        <h1 style="color: yellow; font-size: 30px; margin-bottom: 20px;">PAUSED</h1>
        <button id="resumeBtn" style="font-family:'Press Start 2P'; padding: 15px; cursor: pointer;">CONTINUE</button>
        <button id="exitToLoginBtn" style="font-family:'Press Start 2P'; padding: 15px; cursor: pointer; margin-top: 10px;">EXIT</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: red; font-size: 40px; margin-bottom: 20px;">GAME OVER</h1>
        <p style="color: white; font-family:'Press Start 2P';">SCORE: <span id="finalScore">0</span></p>
        <button id="restartBtn" style="font-family:'Press Start 2P'; padding: 15px; cursor: pointer; margin-top: 20px;">RETRY</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        storageBucket: "pacman-game-e602a.firebasestorage.app",
        messagingSenderId: "316960307396",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => { if (!user) window.location = "login.html"; });
</script>

<script type="module" src="game.js"></script>
</body>
</html>
