<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade - Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* TU CSS LIMPIO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
        .game-wrapper { display: flex; align-items: flex-start; gap: 25px; }
        .game-area {
            position: relative;
            border: 5px solid #ffe600;
            box-shadow: 0 0 20px rgba(255, 230, 0, 0.5);
            background: #000;
            width: 600px; height: 800px;
        }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-area">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
    </div>
</div>

<script>
    // 1. Verificamos si el Canvas existe antes de cargar el juego
    window.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('gameCanvas');
        if (!canvas) {
            console.error("CRÍTICO: No se encontró el elemento 'gameCanvas'. Revisa el ID.");
        } else {
            console.log("Canvas listo. Intentando cargar game.js...");
        }
    });

    // 2. Capturamos errores globales del juego
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        alert("¡ERROR EN EL JUEGO!\nMensaje: " + msg + "\nLínea: " + lineNo);
        return false;
    };
</script>

<script type="module" src="game.js"></script>

</body>
</html>
