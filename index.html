<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Estilos para los botones laterales según tu lógica */
        .top-controls {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .top-controls button {
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 15px;
            width: 120px;
            cursor: pointer;
            background: #222;
            color: white;
            border: 2px solid #ffe600;
            box-shadow: 0 0 10px rgba(255, 230, 0, 0.3);
        }
        .top-controls button:hover {
            background: #ffe600;
            color: black;
        }

        /* Pantallas superpuestas */
        .menu-overlay {
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            color: white; 
            z-index: 2000; 
            text-align: center; 
            font-family: 'Press Start 2P';
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menu-btn {
            font-family: 'Press Start 2P';
            padding: 15px;
            width: 250px;
            margin: 10px;
            cursor: pointer;
            border: 2px solid white;
            background: black;
            color: white;
        }
        #exitToLoginBtn { background: #ff3333; border: none; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <div class="top-controls">
        <button id="pauseBtn">PAUSE</button>
        <button id="menuBtn">MENU</button>
    </div>

    <div id="menuScreen" class="menu-overlay">
        <h1 style="color: yellow; margin-bottom: 30px;">GAME MENU</h1>
        <button id="resumeBtn" class="menu-btn">CONTINUE</button>
        <button id="leaderBtn" class="menu-btn">TOP 10</button>
        <button id="exitToLoginBtn" class="menu-btn">EXIT TO LOGIN</button>
    </div>

    <div id="confirmModal" class="menu-overlay" style="background: rgba(255,0,0,0.2);">
        <div style="background: black; border: 2px solid white; padding: 40px;">
            <p>QUIT TO MAIN MENU?</p><br>
            <button id="confirmYes" style="color: red; cursor: pointer; font-family: 'Press Start 2P'; background: none; border: none;">YES</button>
            <button id="confirmNo" style="margin-left: 30px; cursor: pointer; font-family: 'Press Start 2P'; background: none; border: none; color: white;">NO</button>
        </div>
    </div>

    <div id="gameOverScreen" class="game-over hidden">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location = "login.html";
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
