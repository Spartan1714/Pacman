<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* CSS INTEGRADO Y CORREGIDO */
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: black; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
        }

        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 95vw;
            max-height: 95vh;
        }

        .top-ui {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-family: 'Press Start 2P', cursive;
            color: white;
            font-size: 18px;
        }

        canvas {
            background: #000;
            border: 3px solid #ffe600;
            box-shadow: 0 0 20px #ffe600;
            display: block;
        }

        /* CONTROLES LATERALES */
        .top-controls {
            position: absolute;
            top: 50px;
            right: -140px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-controls button {
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 15px;
            cursor: pointer;
            background: #222;
            color: white;
            border: 2px solid #ffe600;
            transition: 0.2s;
        }

        .top-controls button:hover { background: #ffe600; color: black; }

        /* PANTALLAS (MENU / GAMEOVER) */
        #menuScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-family: 'Press Start 2P';
        }

        .hidden { display: none !important; }

        .menu-btn, #restartBtn, #exitBtn {
            font-family: 'Press Start 2P';
            padding: 15px;
            width: 250px;
            margin: 10px;
            cursor: pointer;
            border: none;
        }

        #resumeBtn { background: #00ff00; }
        #exitToLoginBtn, #exitBtn { background: #ff3333; color: white; }
        #restartBtn { background: #ffe600; }

        .arcade-title { color: #ffe600; font-size: 50px; margin-bottom: 20px; text-align: center; }
    </style>
</head>

<body>

<div class="game-wrapper">
    <div class="top-ui">
        <div id="scoreDisplay">SCORE: 0</div>
        <div id="livesDisplay">LIVES: 3</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="top-controls">
        <button id="pauseBtn">PAUSE</button>
        <button id="menuBtn">MENU</button>
    </div>

    <div id="menuScreen" class="hidden">
        <h1 class="arcade-title">PAUSED</h1>
        <button id="resumeBtn" class="menu-btn">CONTINUE</button>
        <button id="exitToLoginBtn" class="menu-btn">QUIT GAME</button>
    </div>

    <div id="gameOverScreen" class="hidden">
        <h1 class="arcade-title">GAME OVER</h1>
        <p style="color: white;">FINAL SCORE: <span id="finalScore">0</span></p>
        <button id="restartBtn">RETRY</button>
        <button id="exitBtn">EXIT</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location = "login.html";
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
