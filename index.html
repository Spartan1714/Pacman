<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pacman</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-container">
        <button id="pauseBtn" class="hud-button">PAUSE</button>
        <button id="menuBtn" class="hud-button">MENU</button>

        <canvas id="gameCanvas"></canvas>

        <div id="menuScreen" class="overlay hidden">
            <h1 style="color:yellow">PAUSED</h1>
            <button onclick="location.reload()" style="margin-top:20px; font-family:'Press Start 2P'">RESTART</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1 style="color:red">GAME OVER</h1>
            <button onclick="location.reload()" style="margin-top:20px; font-family:'Press Start 2P'">TRY AGAIN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        // ... (Tu config aquí)
    </script>

    <script type="module" src="game.js"></script>
</body>
</html>
