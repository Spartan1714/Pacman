<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: black; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            font-family: 'Press Start 2P', cursive;
        }

        .game-wrapper {
            position: relative;
            display: flex;
            align-items: flex-start; /* Alinea botones arriba a la derecha */
            gap: 20px;
        }

        /* FUERZA EL TAMAÑO AQUÍ: Si tu juego no se ve, es porque el canvas mide 0 */
        .canvas-container {
            position: relative;
            border: 4px solid #ffe600;
            box-shadow: 0 0 20px #ffe600;
            background: #000;
            width: 600px;  /* Ajusta según el tamaño de tu laberinto */
            height: 800px; /* Ajusta según el tamaño de tu laberinto */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .side-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .arcade-btn {
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 12px;
            cursor: pointer;
            background: #000;
            color: #ffe600;
            border: 2px solid #ffe600;
        }
        .arcade-btn:hover { background: #ffe600; color: #000; }

        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 200;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="side-controls">
        <button id="pauseBtn" class="arcade-btn">PAUSE</button>
        <button id="menuBtn" class="arcade-btn">MENU</button>
    </div>

    <div id="menuScreen" class="overlay hidden">
        <h1 style="color: yellow; margin-bottom: 20px;">PAUSED</h1>
        <button id="resumeBtn" class="arcade-btn">CONTINUE</button>
    </div>
</div>

<div id="usernameModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div style="background:#111; padding:40px; border:3px solid #ffe600; text-align:center;">
        <h2 style="color:#ffe600; font-size:16px; margin-bottom:20px;">ENTER NICKNAME</h2>
        <input type="text" id="nicknameInput" maxlength="12" style="background:#222; border:1px solid #555; color:white; padding:10px; text-align:center; margin-bottom:20px; font-family:'Press Start 2P';">
        <br>
        <button id="saveNicknameBtn" class="arcade-btn" style="background:#ffe600; color:black;">START GAME</button>
    </div>
</div>

<script type="module">
    // --- Lógica del Botón ---
    const modal = document.getElementById('usernameModal');
    const btn = document.getElementById('saveNicknameBtn');
    const input = document.getElementById('nicknameInput');

    btn.onclick = () => {
        if (input.value.trim() !== "") {
            localStorage.setItem('pacmanNickname', input.value.trim());
            modal.classList.add('hidden'); // Oculta el modal
            
            // Forzamos al juego a arrancar
            window.dispatchEvent(new CustomEvent('gameStart'));
        }
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };
    initializeApp(firebaseConfig);
    const auth = getAuth();
    onAuthStateChanged(auth, (user) => { if (!user) window.location = "login.html"; });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
