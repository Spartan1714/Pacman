<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* Tu marco amarillo original */
        .game-area {
            border: 4px solid #ffe600;
            box-shadow: 0 0 20px rgba(255, 230, 0, 0.5);
            background: #000;
            width: 600px; 
            height: 800px;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .side-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .arcade-btn {
            background: #000;
            color: #ffe600;
            border: 2px solid #ffe600;
            padding: 15px;
            font-family: 'Press Start 2P';
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-area">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
    </div>

    <div class="side-controls">
        <button id="pauseBtn" class="arcade-btn">PAUSE</button>
        <button id="menuBtn" class="arcade-btn">MENU</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location = "login.html";
        } else {
            console.log("Sesión activa, cargando motor...");
            // Si hay sesión, el juego cargado abajo debería funcionar solo.
        }
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
