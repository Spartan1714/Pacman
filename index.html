<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
        }

        /* Contenedor con borde neón amarillo */
        .canvas-container {
            border: 4px solid #ffe600;
            box-shadow: 0 0 20px rgba(255, 230, 0, 0.6);
            background: #000;
            /* IMPORTANTE: Ajustamos el tamaño aquí */
            width: 600px; 
            height: 800px;
        }

        /* Forzamos al canvas a ocupar todo el contenedor */
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .side-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .arcade-btn {
            background: #000;
            color: #ffe600;
            border: 2px solid #ffe600;
            padding: 15px;
            font-family: 'Press Start 2P';
            font-size: 10px;
            cursor: pointer;
        }

        /* Modal inicial: Aseguramos que no bloquee el renderizado si ya existe el nombre */
        #usernameModal {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            display: none; /* Por defecto oculto, JS lo mostrará si hace falta */
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="canvas-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
    </div>

    <div class="side-controls">
        <button id="pauseBtn" class="arcade-btn">PAUSE</button>
        <button id="menuBtn" class="arcade-btn">MENU</button>
    </div>
</div>

<div id="usernameModal">
    <div style="background: #111; padding: 40px; border: 3px solid #ffe600; text-align: center;">
        <h2 style="color:#ffe600; margin-bottom: 20px; font-size: 14px;">ENTER SPARTAN NICKNAME</h2>
        <input type="text" id="nicknameInput" maxlength="12" style="background:#222; border:1px solid #555; color:white; padding:10px; text-align:center; font-family:'Press Start 2P';">
        <br><br>
        <button id="saveNicknameBtn" class="arcade-btn" style="background:#ffe600; color:black;">START GAME</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();
    const modal = document.getElementById('usernameModal');

    // Función para disparar el motor del juego
    function startEngine(name) {
        localStorage.setItem('pacmanNickname', name);
        modal.style.display = 'none';
        
        console.log("Motor listo para:", name);

        // Cargamos el script del juego DESPUÉS de limpiar la pantalla
        const gameScript = document.createElement('script');
        gameScript.type = 'module';
        gameScript.src = 'game.js';
        document.body.appendChild(gameScript);
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location = "login.html";
        } else {
            const savedName = localStorage.getItem('pacmanNickname');
            if (savedName) {
                startEngine(savedName);
            } else {
                modal.style.display = 'flex';
            }
        }
    });

    document.getElementById('saveNicknameBtn').onclick = () => {
        const name = document.getElementById('nicknameInput').value.trim();
        if (name) startEngine(name);
    };
</script>

</body>
</html>
