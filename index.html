<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Regresamos al CSS más simple posible para no interferir con game.js */
        body {
            margin: 0; background: black;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Press Start 2P', cursive;
        }
        #gameCanvas {
            border: 3px solid #ffe600;
            display: block;
        }
        /* El modal solo aparece si es estrictamente necesario */
        #usernameModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="usernameModal">
        <div style="text-align: center; border: 2px solid yellow; padding: 20px;">
            <h2 style="color: yellow; font-size: 14px;">NICKNAME:</h2>
            <input type="text" id="nicknameInput" style="margin: 10px; padding: 5px;">
            <button id="saveNicknameBtn" style="padding: 10px; cursor: pointer;">START</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
            authDomain: "pacman-game-e602a.firebaseapp.com",
            projectId: "pacman-game-e602a",
            appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
        };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        const modal = document.getElementById('usernameModal');
        
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location = "login.html";
            } else {
                const nick = localStorage.getItem('pacmanNickname');
                if (!nick) {
                    modal.style.display = 'flex';
                } else {
                    // SI YA TIENE NICK, CARGAMOS EL JUEGO NORMAL
                    cargarJuego();
                }
            }
        });

        document.getElementById('saveNicknameBtn').onclick = () => {
            const val = document.getElementById('nicknameInput').value;
            if(val) {
                localStorage.setItem('pacmanNickname', val);
                modal.style.display = 'none';
                cargarJuego();
            }
        };

        function cargarJuego() {
            // Esta es la forma más limpia de cargar el JS sin que se rompa
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'game.js';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
