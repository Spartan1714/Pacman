<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-container">
        <button id="pauseBtn" class="hud-button">PAUSE</button>
        <button id="menuBtn" class="hud-button">MENU</button>

        <canvas id="gameCanvas"></canvas>

        <div id="menuScreen" class="overlay hidden">
            <h1 style="color: yellow;">PAUSED</h1>
            <button id="resumeBtn" style="padding:15px; cursor:pointer; font-family:'Press Start 2P';">CONTINUE</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1 style="color: red;">GAME OVER</h1>
            <p style="color: white;">FINAL SCORE: <span id="finalScore">0</span></p>
            <button id="restartBtn" style="padding:15px; cursor:pointer; font-family:'Press Start 2P';">RESTART</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        // ... (Tu config de Firebase aquí)
    </script>
    <script type="module" src="game.js"></script>

</body>
</html>
