<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-container">
        <button id="pauseBtn" class="hud-button">PAUSE</button>
        <button id="menuBtn" class="hud-button">MENU</button>

        <canvas id="gameCanvas"></canvas>

        <div id="menuScreen" class="overlay hidden">
            <h1 style="color: yellow; margin-bottom: 20px;">PAUSED</h1>
            <button id="resumeBtn" style="font-family:'Press Start 2P'; padding: 10px; cursor: pointer;">CONTINUE</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1 style="color: red; margin-bottom: 20px;">GAME OVER</h1>
            <button id="restartBtn" style="font-family:'Press Start 2P'; padding: 10px; cursor: pointer;">RETRY</button>
        </div>
    </div>

    <script type="module">
        // Tu configuración de Firebase aquí...
    </script>
    
    <script type="module" src="game.js"></script>
</body>
</html>
