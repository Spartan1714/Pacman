<div class="game-container">
    <canvas id="gameCanvas"></canvas>

    <div class="bottom-controls">
        <button id="pauseBtn">Pause [P]</button>
        <button id="menuBtn">Menu [M]</button>
    </div>

    <div id="menuScreen" class="overlay hidden">
        <h1 style="color: yellow; margin-bottom: 30px;">PAUSED</h1>
        <button id="resumeBtn" class="menu-btn" style="background:#00ff00; padding:15px; font-family:'Press Start 2P'; cursor:pointer;">CONTINUE</button>
        <button id="exitToLoginBtn" class="menu-btn" style="background:#ff4444; margin-top:10px; padding:15px; font-family:'Press Start 2P'; cursor:pointer;">EXIT</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="arcade-title">GAME OVER</h1>
        <p style="color:white; margin-bottom:30px;">SCORE: <span id="finalScore">0</span></p>
        <button id="restartBtn" style="background:#00ff00; padding:15px; font-family:'Press Start 2P'; cursor:pointer;">RETRY</button>
    </div>
</div>
