<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-layout">
    
    <div class="top-ui">
        <div id="scoreDisplay">SCORE: 0</div>
        <div id="livesDisplay">LIVES: 3</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="side-controls">
        <button id="pauseBtn">PAUSE</button>
        <button id="menuBtn">MENU</button>
    </div>

    <div id="menuScreen" class="overlay hidden">
        <h1 class="arcade-title" style="font-size: 40px; color: yellow;">GAME MENU</h1>
        <button id="resumeBtn" class="menu-btn" style="background: #00ff00;">CONTINUE</button>
        <button id="leaderBtn" class="menu-btn" style="background: white;">TOP 10</button>
        <button id="exitToLoginBtn" class="menu-btn">EXIT TO LOGIN</button>
    </div>

    <div id="confirmModal" class="overlay hidden" style="background:rgba(255,0,0,0.1);">
        <div style="background:black; border: 4px solid white; padding:40px; text-align:center;">
            <p style="color:white; font-family:'Press Start 2P'; margin-bottom:30px;">QUIT TO MAIN MENU?</p>
            <button id="confirmYes" style="color:red; background:none; border:none; font-family:'Press Start 2P'; cursor:pointer; font-size:16px;">YES</button>
            <button id="confirmNo" style="color:white; background:none; border:none; font-family:'Press Start 2P'; cursor:pointer; font-size:16px; margin-left:30px;">NO</button>
        </div>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="arcade-title">GAME OVER</h1>
        <p class="score-text">SCORE: <span id="finalScore">0</span></p>
        <div style="display:flex; gap:20px; margin-top:30px;">
            <button id="restartBtn" class="menu-btn" style="background: #00ff00; width:auto;">RESTART</button>
            <button id="exitBtn" class="menu-btn" style="background: #ff4444; width:auto; color:white;">EXIT</button>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        storageBucket: "pacman-game-e602a.firebasestorage.app",
        messagingSenderId: "316960307396",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location = "login.html";
        }
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
