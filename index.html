<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        /* El marco amarillo que tenías */
        #gameCanvas { border: 5px solid #ffe600; box-shadow: 0 0 20px #ffe600; background: #000; }
        
        #usernameModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; display: none;
            align-items: center; justify-content: center; font-family: 'Press Start 2P', cursive;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="800"></canvas>

    <div id="usernameModal">
        <div style="border: 2px solid yellow; padding: 40px; text-align: center;">
            <p>NICKNAME:</p>
            <input type="text" id="nicknameInput" style="margin: 20px; padding: 10px;">
            <br>
            <button id="saveNicknameBtn" style="padding: 10px; cursor: pointer; font-family: 'Press Start 2P';">START</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // Config de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
            authDomain: "pacman-game-e602a.firebaseapp.com",
            projectId: "pacman-game-e602a",
            appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
        };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location = "login.html";
            } else {
                const nick = localStorage.getItem('pacmanNickname');
                if (nick) {
                    cargarMotor();
                } else {
                    document.getElementById('usernameModal').style.display = 'flex';
                }
            }
        });

        document.getElementById('saveNicknameBtn').onclick = () => {
            const val = document.getElementById('nicknameInput').value.trim();
            if (val) {
                localStorage.setItem('pacmanNickname', val);
                document.getElementById('usernameModal').style.display = 'none';
                cargarMotor();
            }
        };

        function cargarMotor() {
            console.log("Cargando game.js ahora mismo...");
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'game.js';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
