<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-container">
    <button id="pauseBtn" class="hud-button">PAUSE</button>
    <button id="menuBtn" class="hud-button">MENU</button>

    <canvas id="gameCanvas"></canvas>

    <div id="menuScreen" class="overlay hidden">
        <h1 class="arcade-title">PAUSED</h1>
        <button id="resumeBtn" class="menu-btn">CONTINUE</button>
        <button id="leaderBtn" class="menu-btn">TOP 10</button>
        <button id="exitToLoginBtn" class="menu-btn" style="color:#ff4444; border-color:#ff4444;">EXIT</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="arcade-title" style="color: red; text-shadow: 0 0 10px red;">GAME OVER</h1>
        <p style="color: #00ffff; font-size: 14px; margin-bottom: 20px;">SCORE: <span id="finalScore">0</span></p>
        <div style="display:flex;">
            <button id="restartBtn" class="menu-btn">RETRY</button>
            <button id="exitBtn" class="menu-btn">QUIT</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        storageBucket: "pacman-game-e602a.firebasestorage.app",
        messagingSenderId: "316960307396",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location = "login.html";
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
