<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman - Edición Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Base y Layout */
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: black; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            font-family: 'Press Start 2P', cursive;
        }

        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* UI Superior: Solo una línea de datos */
        .top-ui {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            color: white;
            font-size: 16px;
        }

        /* Canvas con tu estilo neón original */
        canvas {
            background: #000;
            border: 3px solid #ffe600;
            box-shadow: 0 0 15px #ffe600;
            display: block;
        }

        /* Botones laterales */
        .side-controls {
            position: absolute;
            top: 50px;
            right: -160px; /* Ajusta esto si los botones quedan muy lejos */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-controls button {
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 12px;
            cursor: pointer;
            background: #222;
            color: white;
            border: 2px solid #ffe600;
            transition: 0.1s;
        }

        .side-controls button:hover { background: #ffe600; color: black; }

        /* Pantallas de Menú y GameOver */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        .btn-large {
            font-family: 'Press Start 2P';
            padding: 15px;
            width: 250px;
            margin: 10px;
            cursor: pointer;
            border: none;
        }
        
        #restartBtn { background: #00ff00; }
        #exitBtn { background: #ff3333; color: white; }
        
        .title { color: #ffe600; font-size: 40px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="top-ui">
        <div id="scoreText">SCORE: 0</div>
        <div id="livesText">LIVES: 3</div>
        <div id="lvlText">LVL: 1</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="side-controls">
        <button id="pauseBtn">PAUSE</button>
        <button id="menuBtn">MENU</button>
    </div>

    <div id="menuScreen" class="overlay hidden">
        <h1 class="title">PAUSED</h1>
        <button id="resumeBtn" class="btn-large" style="background: #00ff00;">CONTINUE</button>
        <button id="exitToLoginBtn" class="btn-large" style="background: #ff3333; color: white;">EXIT</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="title">GAME OVER</h1>
        <p style="color: white;">SCORE: <span id="finalScore">0</span></p>
        <button id="restartBtn" class="btn-large">RETRY</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
        authDomain: "pacman-game-e602a.firebaseapp.com",
        projectId: "pacman-game-e602a",
        appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location = "login.html";
    });
</script>

<script type="module" src="game.js"></script>

</body>
</html>
