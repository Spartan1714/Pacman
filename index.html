<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
        }
        .game-area {
            border: 5px solid #ffe600;
            box-shadow: 0 0 20px #ffe600;
            background: #000;
            /* Asegúrate de que estas medidas sean las que usa tu juego */
            width: 600px; 
            height: 800px;
        }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <div class="game-area">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
            authDomain: "pacman-game-e602a.firebaseapp.com",
            projectId: "pacman-game-e602a",
            appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                console.log("Usuario verificado. Arrancando motor...");
                
                // CARGA FORZADA: Inyectamos el juego solo cuando hay sesión
                const gameScript = document.createElement('script');
                gameScript.type = 'module';
                gameScript.src = 'game.js';
                // Añadimos un pequeño retraso para que el navegador respire
                setTimeout(() => {
                    document.body.appendChild(gameScript);
                }, 500);
            }
        });
    </script>
</body>
</html>
