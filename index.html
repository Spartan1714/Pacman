<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
#logoutBtn {
    position:absolute;
    top:10px;
    right:10px;
    z-index:1000;
    font-family:'Press Start 2P';
    font-size:10px;
}
</style>

</head>

<body>

<canvas id="gameCanvas"></canvas>

<!-- BOTÓN LOGOUT (FUERA de scripts) -->
<button id="logoutBtn">LOGOUT</button>

<!-- GAME OVER UI (opcional) -->
<div id="gameOverScreen" class="game-over hidden">
    <h1 class="arcade-title">GAME OVER</h1>
    <p class="score-text">Score: <span id="finalScore"></span></p>

    <div class="buttons">
        <button id="restartBtn">RESTART</button>
        <button id="exitBtn">EXIT</button>
    </div>
</div>

<!-- FIREBASE AUTH CHECK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDjYUCgsPmifR0hNTaw3aD9Qg5dyjDdxM",
  authDomain: "pacman-game-e602a.firebaseapp.com",
  projectId: "pacman-game-e602a",
  storageBucket: "pacman-game-e602a.firebasestorage.app",
  messagingSenderId: "316960307396",
  appId: "1:316960307396:web:2b33cecfd8b3dde621f191"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location = "login.html";
    }
});
</script>

<!-- GAME -->
<script type="module" src="game.js"></script>

</body>
</html>
