<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacman Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <div id="menuScreen" class="menu-overlay hidden">
        <h1 style="color: yellow; margin-bottom: 30px;">PAUSED</h1>
        <button id="resumeBtn" class="menu-btn">CONTINUE</button>
        <button id="leaderBtn" class="menu-btn">TOP 10</button>
        <button id="exitToLoginBtn" class="menu-btn" style="color: #ff3333;">EXIT</button>
    </div>

    <div id="confirmModal" class="menu-overlay hidden" style="background: rgba(255,0,0,0.2);">
        <div style="background: black; border: 2px solid white; padding: 40px; text-align: center;">
            <p>QUIT TO MAIN MENU?</p><br>
            <button id="confirmYes" style="color: #ff3333; cursor: pointer; font-family: 'Press Start 2P'; background: none; border: none;">YES</button>
            <button id="confirmNo" style="margin-left: 30px; cursor: pointer; font-family: 'Press Start 2P'; background: none; border: none; color: white;">NO</button>
        </div>
    </div>

    <div id="gameOverUI" class="menu-overlay hidden">
    <h2 style="color: #ff0033; margin-bottom: 20px; font-family: 'Press Start 2P';">GAME OVER</h2>
    
    <button id="btnRestart" class="menu-btn" style="background: #00ff00; color: black; border: none;">RESTART</button>
    
    <button id="btnLeaderboardGameOver" class="menu-btn" style="background: #00ffff; color: black; border: none; margin: 10px 0;">TOP 10</button>
    
    <button id="btnExit" class="menu-btn" style="background: #ff3333; color: white; border: none;">EXIT</button>
</div>
</div>

<script type="module" src="game.js"></script>
</body>
</html>
