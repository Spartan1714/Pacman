<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Pacman Login</title>

<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<script type="module" src="login.js"></script>

</head>

<body>

<div class="login-container">

<h1 class="title">PAC-MAN</h1>

<div class="login-box">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="login" class="btn-main">LOGIN</button>

<button id="register" class="btn-alt">REGISTER</button>

<div class="divider">OR</div>

<div class="oauth-container">

<button id="google" class="oauth-btn google">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Sign in with Google
</button>

<button id="facebook" class="oauth-btn facebook">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
Sign in with Facebook
</button>

<button id="apple" class="oauth-btn apple">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Apple_logo_white.svg">

Sign in with Apple

</button>

</div>

</div>

</div>
<script type="module" src="js/game.js"></script>
</body>
</html>
